services:
  # Lelu Engine - Authorization Engine (Main API for SDKs)
  - type: web
    name: lelu-engine
    env: docker
    dockerfilePath: ./engine/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: LISTEN_ADDR
        value: ":8080"
      - key: PORT
        value: "8080"
      - key: POLICY_PATH
        value: /etc/lelu/auth.yaml
      - key: REDIS_ADDR
        fromService:
          type: redis
          name: lelu-redis
          property: host
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: LELU_MODE
        value: enforce

databases:
  # Redis for token store and queue
  - name: lelu-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
