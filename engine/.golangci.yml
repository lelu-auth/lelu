run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/lelu

issues:
  exclude-rules:
    - path: "_test.go"
      linters: [gosec, errcheck]
