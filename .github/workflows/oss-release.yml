name: OSS Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-engine:
    name: Release engine binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/prism-engine-linux-amd64 ./engine/cmd/engine
          GOOS=darwin GOARCH=arm64 go build -o dist/prism-engine-darwin-arm64 ./engine/cmd/engine
          GOOS=windows GOARCH=amd64 go build -o dist/prism-engine-windows-amd64.exe ./engine/cmd/engine

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/prism-engine-linux-amd64
            dist/prism-engine-darwin-arm64
            dist/prism-engine-windows-amd64.exe
