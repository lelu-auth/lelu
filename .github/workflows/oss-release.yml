name: OSS Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-engine:
    name: Release engine binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/prizm-engine-linux-amd64 ./engine/cmd/engine
          GOOS=darwin GOARCH=arm64 go build -o dist/prizm-engine-darwin-arm64 ./engine/cmd/engine
          GOOS=windows GOARCH=amd64 go build -o dist/prizm-engine-windows-amd64.exe ./engine/cmd/engine

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          {
            echo "## Prism OSS Release"
            echo ""
            echo "### Artifacts"
            echo "- prizm-engine-linux-amd64"
            echo "- prizm-engine-darwin-arm64"
            echo "- prizm-engine-windows-amd64.exe"
            echo ""
            echo "### Highlights"
            echo "- Confidence-aware auth engine"
            echo "- OPA/Rego compatibility mode"
            echo "- Helm chart for Kubernetes deployment"
            echo "- Enterprise SSO paths (OIDC + trusted SSO header mode)"
          } > RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            dist/prizm-engine-linux-amd64
            dist/prizm-engine-darwin-arm64
            dist/prizm-engine-windows-amd64.exe
