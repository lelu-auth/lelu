name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate release-please token
        id: rp_token
        shell: bash
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "::error::Missing RELEASE_PLEASE_TOKEN secret. Create a PAT with repo contents+pull-requests write permissions and add it as RELEASE_PLEASE_TOKEN."
            exit 1
          fi
          echo "token=$RELEASE_PLEASE_TOKEN" >> "$GITHUB_OUTPUT"

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.rp_token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: actions/checkout@v4

      # Publish TypeScript SDK to npm
      - name: Setup Node.js
        if: ${{ steps.release.outputs['sdk/typescript--release_created'] }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve npm token
        if: ${{ steps.release.outputs['sdk/typescript--release_created'] }}
        id: npm_token
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "token=$NPM_TOKEN" >> "$GITHUB_OUTPUT"
          elif [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "token=$NODE_AUTH_TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Missing npm secret. Set NPM_TOKEN (or NODE_AUTH_TOKEN) in repo Actions secrets."
            exit 1
          fi

      - name: Configure npm auth
        if: ${{ steps.release.outputs['sdk/typescript--release_created'] }}
        shell: bash
        run: |
          printf "//registry.npmjs.org/:_authToken=%s\n" "${{ steps.npm_token.outputs.token }}" > "$HOME/.npmrc"

      - name: Build and Publish TypeScript SDK
        if: ${{ steps.release.outputs['sdk/typescript--release_created'] }}
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm_token.outputs.token }}

      # Publish Python SDK to PyPI
      - name: Setup Python
        if: ${{ steps.release.outputs['sdk/python--release_created'] }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python SDK
        if: ${{ steps.release.outputs['sdk/python--release_created'] }}
        working-directory: sdk/python
        run: |
          pip install build twine
          python -m build

      - name: Publish Python SDK to PyPI
        if: ${{ steps.release.outputs['sdk/python--release_created'] }}
        working-directory: sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN || secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::error::Missing PyPI secret. Set PYPI_API_TOKEN or PYPI_TOKEN in repo secrets."
            exit 1
          fi
          twine upload dist/*

      # Publish Go SDK (module release via git tag)
      - name: Setup Go
        if: ${{ steps.release.outputs['sdk/go--release_created'] }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate Go SDK module
        if: ${{ steps.release.outputs['sdk/go--release_created'] }}
        working-directory: sdk/go
        run: |
          go mod tidy
          go test ./...
          go list -m

      - name: Go SDK publish note
        if: ${{ steps.release.outputs['sdk/go--release_created'] }}
        run: |
          echo "Go module release created via tag: ${{ steps.release.outputs['sdk/go--tag_name'] }}"
          echo "Consumers can install with: go get github.com/lelu-auth/lelu/sdk/go@latest"
