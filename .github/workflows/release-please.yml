name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: actions/checkout@v4

      # Publish TypeScript SDK to npm
      - name: Setup Node.js
        if: ${{ steps.release.outputs['sdk/typescript--release_created'] }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and Publish TypeScript SDK
        if: ${{ steps.release.outputs['sdk/typescript--release_created'] }}
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish Python SDK to PyPI
      - name: Setup Python
        if: ${{ steps.release.outputs['sdk/python--release_created'] }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python SDK
        if: ${{ steps.release.outputs['sdk/python--release_created'] }}
        working-directory: sdk/python
        run: |
          pip install build
          python -m build

      - name: Publish Python SDK to PyPI
        if: ${{ steps.release.outputs['sdk/python--release_created'] }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN || secrets.PYPI_TOKEN }}

      # Publish Go SDK (module release via git tag)
      - name: Setup Go
        if: ${{ steps.release.outputs['sdk/go--release_created'] }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate Go SDK module
        if: ${{ steps.release.outputs['sdk/go--release_created'] }}
        working-directory: sdk/go
        run: |
          go mod tidy
          go test ./...
          go list -m

      - name: Go SDK publish note
        if: ${{ steps.release.outputs['sdk/go--release_created'] }}
        run: |
          echo "Go module release created via tag: ${{ steps.release.outputs['sdk/go--tag_name'] }}"
          echo "Consumers can install with: go get github.com/lelu-auth/lelu/sdk/go@latest"
