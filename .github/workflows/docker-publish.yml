name: Docker Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: engine
            context: .
            dockerfile: engine/Dockerfile
            image: lelu-engine
            description: "Core authorization engine with policy evaluation"
          - name: platform
            context: platform
            dockerfile: platform/Dockerfile
            image: lelu-platform
            description: "Control plane API for policies and audit logs"
          - name: ui
            context: platform/ui
            dockerfile: platform/ui/Dockerfile
            image: lelu-ui
            description: "Web dashboard for monitoring and management"
          - name: mcp
            context: sdk/mcp
            dockerfile: sdk/mcp/Dockerfile
            image: lelu-mcp
            description: "Model Context Protocol server"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
            leluauth/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=Lelu

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false
        continue-on-error: true
        id: multi-arch-build

      - name: Build and push (amd64 only fallback)
        if: steps.multi-arch-build.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false

      - name: Image digest
        run: |
          echo "✅ ${{ matrix.name }} image pushed successfully"
          echo "📦 Image: leluauth/${{ matrix.image }}"
          echo "🔖 Tags: ${{ steps.meta.outputs.tags }}"
          if [ "${{ steps.multi-arch-build.outcome }}" == "success" ]; then
            echo "🏗️  Platforms: linux/amd64, linux/arm64"
          else
            echo "🏗️  Platforms: linux/amd64 (arm64 build failed, using fallback)"
          fi
