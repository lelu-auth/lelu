name: Vercel Deploy

on:
  push:
    branches: [main]
    paths:
      - "platform/ui/**"
      - ".github/workflows/vercel-deploy.yml"
  pull_request:
    paths:
      - "platform/ui/**"
      - ".github/workflows/vercel-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy platform/ui to Vercel
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing secret: VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing secret: VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing secret: VERCEL_PROJECT_ID" && exit 1)

      - name: Validate Vercel project access
        shell: sh
        run: |
          code=$(curl -sS -o /tmp/vercel-project.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID")

          if [ "$code" != "200" ]; then
            echo "::error::Vercel project lookup failed (HTTP $code). Verify that VERCEL_TOKEN belongs to the same account/team as VERCEL_ORG_ID and that VERCEL_PROJECT_ID is correct."
            echo "::error::Current IDs: VERCEL_ORG_ID=$VERCEL_ORG_ID VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID"
            echo "::group::Vercel API response"
            cat /tmp/vercel-project.json || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Install dependencies
        working-directory: platform/ui
        run: npm ci

      - name: Build Next.js application
        working-directory: platform/ui
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: platform/ui
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          fi

      - name: Deploy to Vercel
        working-directory: platform/ui
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel deploy --token="$VERCEL_TOKEN"
          else
            vercel deploy --prod --token="$VERCEL_TOKEN"
          fi
