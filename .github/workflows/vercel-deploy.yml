name: Vercel Deploy

on:
  push:
    branches: [main]
    paths:
      - "platform/ui/**"
      - ".github/workflows/vercel-deploy.yml"
  workflow_dispatch:  # allow manual deploys too

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger Vercel production deploy
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook secret
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          test -n "$VERCEL_DEPLOY_HOOK_URL" \
            || { echo "::error::Missing secret VERCEL_DEPLOY_HOOK_URL (create a Deploy Hook in Vercel → Settings → Git and add its URL as a repo secret)"; exit 1; }

      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          code=$(curl -sS -X POST -o /tmp/hook.json -w "%{http_code}" "$VERCEL_DEPLOY_HOOK_URL")
          echo "Deploy hook responded HTTP $code"
          cat /tmp/hook.json 2>/dev/null || true
          echo
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Deploy hook returned HTTP $code"
            exit 1
          fi
          echo "Vercel production deploy triggered successfully."
