name: Deploy to GCP Cloud Run

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (engine|platform|ui|mcp|all)"
        required: false
        default: "all"

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build + push images to Artifact Registry ───────────────────────────
  build:
    name: "Build & push images"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      service: ${{ steps.svc.outputs.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Normalize service target
        id: svc
        run: |
          TARGET="${{ github.event.inputs.service }}"
          echo "target=${TARGET:-all}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.7
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          PROJECT="$(printf '%s' '${{ secrets.GCP_PROJECT_ID }}' | tr -d '[:space:]')"
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image prefix
        id: meta
        run: |
          SHA="${GITHUB_SHA:0:8}"
          REGION="${{ env.GCP_REGION }}"
          PROJECT="$(printf '%s' '${{ secrets.GCP_PROJECT_ID }}' | tr -d '[:space:]')"
          PREFIX="${REGION}-docker.pkg.dev/${PROJECT}/lelu"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"       >> "$GITHUB_OUTPUT"

      # ── Engine ──────────────────────────────────────────────────────────────
      - name: Build & push engine
        if: steps.svc.outputs.target == 'all' || steps.svc.outputs.target == 'engine'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: engine/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/engine:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.prefix }}/engine:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=engine
          cache-to:   type=gha,scope=engine,mode=max

      # ── Platform ────────────────────────────────────────────────────────────
      - name: Build & push platform
        if: steps.svc.outputs.target == 'all' || steps.svc.outputs.target == 'platform'
        uses: docker/build-push-action@v5
        with:
          context: platform
          file: platform/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/platform:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.prefix }}/platform:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=platform
          cache-to:   type=gha,scope=platform,mode=max

      # ── UI ──────────────────────────────────────────────────────────────────
      - name: Build & push ui
        if: steps.svc.outputs.target == 'all' || steps.svc.outputs.target == 'ui'
        uses: docker/build-push-action@v5
        with:
          context: platform/ui
          file: platform/ui/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/ui:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.prefix }}/ui:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=ui
          cache-to:   type=gha,scope=ui,mode=max

      # ── MCP ─────────────────────────────────────────────────────────────────
      - name: Build & push mcp
        if: steps.svc.outputs.target == 'all' || steps.svc.outputs.target == 'mcp'
        uses: docker/build-push-action@v5
        with:
          context: sdk/mcp
          file: sdk/mcp/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/mcp:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.prefix }}/mcp:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=mcp
          cache-to:   type=gha,scope=mcp,mode=max

  # ── 2. Deploy to Cloud Run ────────────────────────────────────────────────
  deploy:
    name: "Deploy to Cloud Run"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.7
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2.1.4

      # Recompute image URIs from the same SHA — avoids inter-job output fragility
      - name: Set deploy vars
        id: vars
        run: |
          SHA="${GITHUB_SHA:0:8}"
          REGION="${{ env.GCP_REGION }}"
          PROJECT="$(printf '%s' '${{ secrets.GCP_PROJECT_ID }}' | tr -d '[:space:]')"
          PREFIX="${REGION}-docker.pkg.dev/${PROJECT}/lelu"
          echo "project=${PROJECT}"                    >> "$GITHUB_OUTPUT"
          echo "engine_image=${PREFIX}/engine:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "platform_image=${PREFIX}/platform:${SHA}" >> "$GITHUB_OUTPUT"
          echo "ui_image=${PREFIX}/ui:${SHA}"           >> "$GITHUB_OUTPUT"
          echo "mcp_image=${PREFIX}/mcp:${SHA}"         >> "$GITHUB_OUTPUT"

      # ── Engine ──────────────────────────────────────────────────────────────
      - name: Deploy engine
        if: needs.build.outputs.service == 'all' || needs.build.outputs.service == 'engine'
        run: |
          PROJECT="${{ steps.vars.outputs.project }}"
          REGION="${{ env.GCP_REGION }}"
          IMAGE="${{ steps.vars.outputs.engine_image }}"

          sed \
            -e "s|__PROJECT__|${PROJECT}|g" \
            -e "s|__REGION__|${REGION}|g" \
            -e "s|__IMAGE__|${IMAGE}|g" \
            infrastructure/gcp/services/engine.yaml \
            > /tmp/engine.yaml

          gcloud run services replace /tmp/engine.yaml \
            --region="${REGION}" --quiet

          gcloud run services add-iam-policy-binding lelu-engine \
            --region="${REGION}" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet || true

      # ── Platform ────────────────────────────────────────────────────────────
      - name: Deploy platform
        if: needs.build.outputs.service == 'all' || needs.build.outputs.service == 'platform'
        run: |
          PROJECT="${{ steps.vars.outputs.project }}"
          REGION="${{ env.GCP_REGION }}"
          IMAGE="${{ steps.vars.outputs.platform_image }}"

          sed \
            -e "s|__PROJECT__|${PROJECT}|g" \
            -e "s|__REGION__|${REGION}|g" \
            -e "s|__IMAGE__|${IMAGE}|g" \
            infrastructure/gcp/services/platform.yaml \
            > /tmp/platform.yaml

          gcloud run services replace /tmp/platform.yaml \
            --region="${REGION}" --quiet

          gcloud run services add-iam-policy-binding lelu-platform \
            --region="${REGION}" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet || true

      # ── Resolve service URLs for UI + MCP ───────────────────────────────────
      - name: Resolve service URLs
        id: urls
        run: |
          REGION="${{ env.GCP_REGION }}"
          ENGINE_URL=$(gcloud run services describe lelu-engine \
            --region="$REGION" --format="value(status.url)" 2>/dev/null || echo "")
          PLATFORM_URL=$(gcloud run services describe lelu-platform \
            --region="$REGION" --format="value(status.url)" 2>/dev/null || echo "")
          echo "engine=${ENGINE_URL}"     >> "$GITHUB_OUTPUT"
          echo "platform=${PLATFORM_URL}" >> "$GITHUB_OUTPUT"

      # ── UI ──────────────────────────────────────────────────────────────────
      - name: Deploy ui
        if: needs.build.outputs.service == 'all' || needs.build.outputs.service == 'ui'
        run: |
          PROJECT="${{ steps.vars.outputs.project }}"
          REGION="${{ env.GCP_REGION }}"
          IMAGE="${{ steps.vars.outputs.ui_image }}"
          ENGINE_URL="${{ steps.urls.outputs.engine }}"
          PLATFORM_URL="${{ steps.urls.outputs.platform }}"

          sed \
            -e "s|__PROJECT__|${PROJECT}|g" \
            -e "s|__REGION__|${REGION}|g" \
            -e "s|__IMAGE__|${IMAGE}|g" \
            -e "s|__ENGINE_URL__|${ENGINE_URL}|g" \
            -e "s|__PLATFORM_URL__|${PLATFORM_URL}|g" \
            infrastructure/gcp/services/ui.yaml \
            > /tmp/ui.yaml

          gcloud run services replace /tmp/ui.yaml \
            --region="${REGION}" --quiet

          gcloud run services add-iam-policy-binding lelu-ui \
            --region="${REGION}" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet || true

      # ── MCP ─────────────────────────────────────────────────────────────────
      - name: Deploy mcp
        if: needs.build.outputs.service == 'all' || needs.build.outputs.service == 'mcp'
        run: |
          PROJECT="${{ steps.vars.outputs.project }}"
          REGION="${{ env.GCP_REGION }}"
          IMAGE="${{ steps.vars.outputs.mcp_image }}"
          ENGINE_URL="${{ steps.urls.outputs.engine }}"

          sed \
            -e "s|__PROJECT__|${PROJECT}|g" \
            -e "s|__REGION__|${REGION}|g" \
            -e "s|__IMAGE__|${IMAGE}|g" \
            -e "s|__ENGINE_URL__|${ENGINE_URL}|g" \
            infrastructure/gcp/services/mcp.yaml \
            > /tmp/mcp.yaml

          gcloud run services replace /tmp/mcp.yaml \
            --region="${REGION}" --quiet

          gcloud run services add-iam-policy-binding lelu-mcp \
            --region="${REGION}" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet || true

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          REGION="${{ env.GCP_REGION }}"
          echo "## Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          for svc in lelu-engine lelu-platform lelu-ui lelu-mcp; do
            URL=$(gcloud run services describe "$svc" \
              --region="$REGION" --format="value(status.url)" 2>/dev/null || echo "not deployed")
            echo "| $svc | $URL |" >> "$GITHUB_STEP_SUMMARY"
          done
