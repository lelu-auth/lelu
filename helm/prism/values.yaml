global:
  imagePullPolicy: IfNotPresent

engine:
  enabled: true
  image: prism/engine:local
  port: 8080
  servicePort: 8082
  env:
    POLICY_PATH: /etc/prism/auth.yaml
    REDIS_ADDR: prism-redis:6379
    JWT_SIGNING_KEY: change-me-in-production
    CONTROL_PLANE_URL: ""
    CP_HMAC_SECRET: ""
    REGO_POLICY_PATH: ""
    REGO_POLICY_QUERY: data.prism.authz

platform:
  enabled: true
  image: prism/platform:local
  port: 9090
  servicePort: 9090
  env:
    DATABASE_URL: postgres://prism:prism-dev-secret@prism-postgres:5432/prism?sslmode=disable
    PLATFORM_API_KEY: platform-dev-key
    OIDC_ISSUER_URL: ""
    OIDC_AUDIENCE: ""

ui:
  enabled: true
  image: prism/ui:local
  port: 3000
  servicePort: 3000
  env:
    PLATFORM_URL: http://prism-platform:9090
    PLATFORM_API_KEY: platform-dev-key

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379

postgres:
  enabled: true
  image: postgres:15
  port: 5432
  db: prism
  user: prism
  password: prism-dev-secret

ingress:
  enabled: false
  className: ""
  host: prism.local
