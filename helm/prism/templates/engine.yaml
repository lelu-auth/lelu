{{- if .Values.engine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-engine
spec:
  replicas: {{ .Values.engine.replicaCount }}
  selector:
    matchLabels:
      app: prism-engine
  template:
    metadata:
      labels:
        app: prism-engine
    spec:
      containers:
        - name: engine
          image: {{ .Values.engine.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.engine.port }}
          env:
            - name: LISTEN_ADDR
              value: ":{{ .Values.engine.port }}"
            - name: POLICY_PATH
              value: {{ .Values.engine.env.POLICY_PATH | quote }}
            - name: REDIS_ADDR
              value: {{ .Values.engine.env.REDIS_ADDR | quote }}
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: prism-secrets
                  key: engineJwtSigningKey
            - name: CONTROL_PLANE_URL
              value: {{ .Values.engine.env.CONTROL_PLANE_URL | quote }}
            - name: CP_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: prism-secrets
                  key: engineCpHmacSecret
            - name: REGO_POLICY_PATH
              value: {{ .Values.engine.env.REGO_POLICY_PATH | quote }}
            - name: REGO_POLICY_QUERY
              value: {{ .Values.engine.env.REGO_POLICY_QUERY | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.engine.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.engine.port }}
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
{{ toYaml .Values.engine.resources | indent 12 }}
          volumeMounts:
            - name: policy
              mountPath: /etc/prism
      volumes:
        - name: policy
          configMap:
            name: prism-policy
---
apiVersion: v1
kind: Service
metadata:
  name: prism-engine
spec:
  selector:
    app: prism-engine
  ports:
    - port: {{ .Values.engine.servicePort }}
      targetPort: {{ .Values.engine.port }}
{{- end }}
