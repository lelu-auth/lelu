global:
  imagePullPolicy: IfNotPresent

secrets:
  engine:
    jwtSigningKey: "REPLACE_ME"
    cpHmacSecret: "REPLACE_ME"
  platform:
    apiKey: "REPLACE_ME"
    databaseUrl: "postgres://lelu:REPLACE_ME@managed-postgres:5432/lelu?sslmode=require"
  ui:
    platformApiKey: "REPLACE_ME"
  postgres:
    password: "REPLACE_ME"

engine:
  enabled: true
  replicaCount: 2
  image: ghcr.io/abenezer0923/prizm-engine:latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    POLICY_PATH: /etc/lelu/auth.yaml
    REDIS_ADDR: managed-redis:6379
    CONTROL_PLANE_URL: https://platform.lelu.example.com
    REGO_POLICY_PATH: ""
    REGO_POLICY_QUERY: data.lelu.authz
    INCIDENT_WEBHOOK_URL: ""
    INCIDENT_WEBHOOK_TIMEOUT_MS: "2000"

platform:
  enabled: true
  replicaCount: 2
  image: ghcr.io/abenezer0923/lelu-platform:latest
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    OIDC_ISSUER_URL: https://login.example.com
    OIDC_AUDIENCE: lelu-platform
    SSO_TRUSTED_HEADER: X-Forwarded-Email
    SSO_TRUSTED_EMAIL_DOMAIN: example.com
    EVIDENCE_SIGNING_KEY: "REPLACE_ME"

ui:
  enabled: true
  replicaCount: 2
  image: ghcr.io/abenezer0923/lelu-ui:latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    PLATFORM_URL: http://lelu-platform:9090

redis:
  enabled: false

postgres:
  enabled: false

ingress:
  enabled: true
  className: nginx
  host: lelu.example.com
  tls:
    enabled: true
    secretName: lelu-example-tls
