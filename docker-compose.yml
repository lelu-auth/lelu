name: prism

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Auth Permission Engine ──────────────────────────────────────────────────
  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    image: prism/engine:local
    container_name: prizm-engine
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      LISTEN_ADDR:       ":8080"
      POLICY_PATH:       "/etc/prism/auth.yaml"
      REDIS_ADDR:        "redis:6379"
      JWT_SIGNING_KEY:   "${JWT_SIGNING_KEY:-change-me-in-dev}"
      CONTROL_PLANE_URL: "${CONTROL_PLANE_URL:-}"
      CP_HMAC_SECRET:    "${CP_HMAC_SECRET:-}"
      API_KEY:           "${API_KEY:-prism-dev-key}"
    volumes:
      - ./config:/etc/prism:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - prism

  # ── Redis — JIT token store & human-review queue ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: prism-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - prism

  # ── PostgreSQL — control plane store ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: prism-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       prism
      POSTGRES_USER:     prism
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-prism-dev-secret}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "prism"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - prism

  # ── Prism Control Plane ──────────────────────────────────────────────────────
  platform:
    build:
      context: platform
      dockerfile: Dockerfile
    image: prism/platform:local
    container_name: prism-platform
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      LISTEN_ADDR:      ":9090"
      DATABASE_URL:     "postgres://prism:${POSTGRES_PASSWORD:-prism-dev-secret}@postgres:5432/prism?sslmode=disable"
      PLATFORM_API_KEY: "${PLATFORM_API_KEY:-platform-dev-key}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - prism

  # ── Trace Explorer UI ──────────────────────────────────────────────────────
  ui:
    build:
      context: platform/ui
      dockerfile: Dockerfile
    image: prism/ui:local
    container_name: prism-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PLATFORM_URL:     "http://platform:9090"
      PLATFORM_API_KEY: "${PLATFORM_API_KEY:-platform-dev-key}"
    depends_on:
      platform:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - prism

  # ── Prism MCP Server ──────────────────────────────────────────────────────────
  mcp:
    build:
      context: sdk/mcp
      dockerfile: Dockerfile
    image: prism/mcp:local
    container_name: prism-mcp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      MCP_TRANSPORT:       "http"
      MCP_PORT:            "3001"
      PRISM_ENGINE_URL:    "http://engine:8080"
      PRISM_API_KEY:       "${API_KEY:-prism-dev-key}"
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - prism

  # ── Redis Insight (optional dev UI) ─────────────────────────────────────────
  redis-ui:
    image: redislabs/redisinsight:latest
    container_name: prism-redis-ui
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis
    profiles:
      - debug                   # only started with: docker compose --profile debug up
    networks:
      - prism

# ─────────────────────────────────────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  redis-data:
  postgres-data:

networks:
  prism:
    driver: bridge
