name: lelu

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Lelu Authorization Engine ──────────────────────────────────────────────────
  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    image: lelu/engine:local
    container_name: lelu-engine
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      LISTEN_ADDR:       ":8080"
      POLICY_PATH:       "/etc/lelu/auth.yaml"
      REDIS_ADDR:        "redis:6379"
      JWT_SIGNING_KEY:   "${JWT_SIGNING_KEY:-change-me-in-dev}"
      CONTROL_PLANE_URL: "${CONTROL_PLANE_URL:-}"
      CP_HMAC_SECRET:    "${CP_HMAC_SECRET:-}"
      API_KEY:           "${API_KEY:-lelu-dev-key}"
      LELU_MODE:         "${LELU_MODE:-enforce}"
      INCIDENT_WEBHOOK_URL: "${INCIDENT_WEBHOOK_URL:-}"
      INCIDENT_WEBHOOK_TIMEOUT_MS: "${INCIDENT_WEBHOOK_TIMEOUT_MS:-2000}"
      INCIDENT_WEBHOOK_SLACK_MODE: "${INCIDENT_WEBHOOK_SLACK_MODE:-}"
      INCIDENT_WEBHOOK_TEAMS_MODE: "${INCIDENT_WEBHOOK_TEAMS_MODE:-}"
      INCIDENT_WEBHOOK_PAGERDUTY_MODE: "${INCIDENT_WEBHOOK_PAGERDUTY_MODE:-}"
      PAGERDUTY_ROUTING_KEY: "${PAGERDUTY_ROUTING_KEY:-}"
      LELU_ENGINE_PUBLIC_URL: "${LELU_ENGINE_PUBLIC_URL:-}"
      TENANT_AUTH_RATE_LIMIT: "${TENANT_AUTH_RATE_LIMIT:-0}"
      TENANT_MINT_RATE_LIMIT: "${TENANT_MINT_RATE_LIMIT:-0}"
      FALLBACK_REDIS_MODE: "${FALLBACK_REDIS_MODE:-closed}"
      FALLBACK_CP_MODE: "${FALLBACK_CP_MODE:-closed}"
    volumes:
      - ./config:/etc/lelu:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - lelu

  # ── Redis — JIT token store & human-review queue ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lelu-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lelu

  # ── PostgreSQL — control plane store ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: lelu-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB:       lelu
      POSTGRES_USER:     lelu
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-lelu-dev-secret}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lelu"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lelu

  # ── Lelu Control Plane ──────────────────────────────────────────────────────
  platform:
    build:
      context: platform
      dockerfile: Dockerfile
    image: lelu/platform:local
    container_name: lelu-platform
    restart: unless-stopped
    ports:
      - "9091:9090"
    environment:
      LISTEN_ADDR:      ":9090"
      DATABASE_URL:     "postgres://lelu:${POSTGRES_PASSWORD:-lelu-dev-secret}@postgres:5432/lelu?sslmode=disable"
      PLATFORM_API_KEY: "${PLATFORM_API_KEY:-platform-dev-key}"
      EVIDENCE_SIGNING_KEY: "${EVIDENCE_SIGNING_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lelu

  # ── Trace Explorer UI ──────────────────────────────────────────────────────
  ui:
    build:
      context: platform/ui
      dockerfile: Dockerfile
    image: lelu/ui:local
    container_name: lelu-ui
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      PLATFORM_URL:     "http://platform:9090"
      PLATFORM_API_KEY: "${PLATFORM_API_KEY:-platform-dev-key}"
      LELU_ENGINE_URL:  "http://engine:8080"
      LELU_API_KEY:     "${API_KEY:-lelu-dev-key}"
    depends_on:
      platform:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lelu

  # ── Lelu MCP Server ──────────────────────────────────────────────────────────
  mcp:
    build:
      context: sdk/mcp
      dockerfile: Dockerfile
    image: lelu/mcp:local
    container_name: lelu-mcp
    restart: unless-stopped
    ports:
      - "3003:3001"
    environment:
      MCP_TRANSPORT:       "http"
      MCP_PORT:            "3001"
      LELU_ENGINE_URL:     "http://engine:8080"
      LELU_API_KEY:        "${API_KEY:-lelu-dev-key}"
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) to avoid container-local hostname resolution edge cases.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lelu

  # ── Redis Insight (optional dev UI) ─────────────────────────────────────────
  redis-ui:
    image: redislabs/redisinsight:latest
    container_name: lelu-redis-ui
    restart: unless-stopped
    ports:
      - "5541:5540"
    depends_on:
      - redis
    profiles:
      - debug                   # only started with: docker compose --profile debug up
    networks:
      - lelu

# ─────────────────────────────────────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  redis-data:
  postgres-data:

networks:
  lelu:
    driver: bridge
